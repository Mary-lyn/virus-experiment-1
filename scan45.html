<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systemscan</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111827;
padding:40px;
border-radius:15px;
width:90%;
max-width:420px;
text-align:center;
}

.progress{
width:100%;
height:18px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:20px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00e5ff,#00ffa6);
}

.warning{
color:#ff5252;
margin-top:20px;
display:none;
}

button{
margin-top:25px;
padding:14px;
width:100%;
border:none;
border-radius:10px;
background:#ff5252;
color:white;
display:none;
}

</style>
</head>

<body>

<div class="card">

<h2>Systemprüfung läuft</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="status">Initialisiere Scan...</div>

<div class="warning" id="warning">
⚠ 45 KRITISCHE BEDROHUNGEN ERKANNT
</div>

<button id="fixbtn" onclick="window.location.href='finale.html'">
Bedrohungen beheben
</button>

</div>

<script>

let progress=0;

let bar=document.getElementById("bar");
let status=document.getElementById("status");

let messages=[
"Scanne Systemdateien...",
"Überprüfe Browser...",
"Analysiere Netzwerk...",
"Suche nach Malware..."
];

let scan=setInterval(()=>{

progress+=3;

bar.style.width=progress+"%";

status.innerText=messages[Math.floor(Math.random()*messages.length)];

if(progress>=100){

clearInterval(scan);

document.getElementById("warning").style.display="block";
document.getElementById("fixbtn").style.display="block";

}

},120);

</script>

</body>
</html>
