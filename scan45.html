<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sicherheitswarnung</title>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0b0b0b;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* Warnbox */
.box{
  background:#111;
  border:3px solid red;
  padding:35px 25px;
  border-radius:15px;
  max-width:420px;
  width:100%;
  text-align:center;
  box-shadow:0 0 50px rgba(255,0,0,0.6);
  animation:glow 2s infinite alternate;
}

/* roter Glow */
@keyframes glow{
  0%{box-shadow:0 0 20px rgba(255,0,0,0.5);}
  100%{box-shadow:0 0 60px rgba(255,0,0,1);}
}

/* Warnsymbol */
.warning{
  font-size:60px;
  color:red;
  margin-bottom:10px;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* Scan Text */
.scan{
  font-size:18px;
  margin-top:10px;
  color:#ccc;
}

/* Fortschrittsbalken */
.progress{
  height:22px;
  background:#333;
  border-radius:12px;
  margin-top:20px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff0000,#ff6600);
}

/* Virus Anzeige */
.virusCount{
  font-size:26px;
  color:#ff3b3b;
  margin-top:15px;
  font-weight:bold;
}

/* Button */
button{
  margin-top:25px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:10px;
  font-size:17px;
  font-weight:bold;
  background:linear-gradient(45deg,#ff0000,#ff6600);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,0,0,0.8);
}
</style>
</head>
<body>

<div class="box">

<div class="warning">⚠</div>

<h2>Kritische Sicherheitswarnung</h2>

<div class="scan">Systemscan läuft...</div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<div class="virusCount" id="virusText">0 Bedrohungen erkannt</div>

<!-- Button führt jetzt zur Statistik -->
<button id="fixBtn" style="display:none;" onclick="goFinal()">
Gerät jetzt schützen
</button>

</div>

<script>
let viruses = 0;
let progress = 0;
let virusText = document.getElementById("virusText");
let bar = document.getElementById("bar");
let fixBtn = document.getElementById("fixBtn");

// Scan Animation
let scan = setInterval(()=>{
  progress += 3;
  bar.style.width = progress + "%";

  if(viruses < 45){
    viruses += Math.floor(Math.random()*3);
    if(viruses > 45) viruses = 45;
    virusText.innerText = viruses + " Bedrohungen erkannt";
  }

  if(progress >= 100){
    clearInterval(scan);
    virusText.innerText = "⚠ 45 schwere Bedrohungen gefunden!";
    fixBtn.style.display = "block";
  }
},120);

// Weiterleitung zur Statistik-Seite
function goFinal(){
  window.location.href = "stats.html";
}
</script>

</body>
</html>
