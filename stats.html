<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiment Statistik</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#16222a,#3a6073);
color:white;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:40px;
border-radius:18px;
text-align:center;
max-width:500px;
}

.bar{
height:20px;
background:#333;
border-radius:10px;
margin:15px 0;
overflow:hidden;
}

.fill{
height:100%;
background:linear-gradient(90deg,#00e5ff,#00ffa6);
width:0%;
}

</style>
</head>

<body>

<div class="card">

<h2>📊 Experiment Statistik</h2>

<p>Typische Reaktionen bei solchen Webseiten:</p>

<div>
<p>Klick auf Viruswarnung</p>
<div class="bar"><div class="fill" id="bar1"></div></div>
</div>

<div>
<p>Belohnung angeklickt</p>
<div class="bar"><div class="fill" id="bar2"></div></div>
</div>

<div>
<p>Kontaktanfrage beantwortet</p>
<div class="bar"><div class="fill" id="bar3"></div></div>
</div>

<p style="margin-top:20px;">
Viele Menschen klicken, weil Webseiten gezielt Emotionen ausnutzen.
</p>

</div>

<script>

setTimeout(()=>{

document.getElementById("bar1").style.width="72%";
document.getElementById("bar2").style.width="63%";
document.getElementById("bar3").style.width="41%";

},500);

</script>

</body>
</html>
