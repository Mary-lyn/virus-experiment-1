<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Statistik</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:35px;
border-radius:20px;
max-width:420px;
width:100%;
text-align:center;
box-shadow:0 0 35px rgba(0,0,0,0.6);
}

.stat{
margin:20px 0;
font-size:20px;
}

.barContainer{
background:#333;
border-radius:10px;
height:25px;
margin-top:8px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00e5ff,#00bcd4);
}

button{
margin-top:25px;
padding:14px;
width:100%;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
background:linear-gradient(45deg,#00e5ff,#00bcd4);
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>📊 Klassen-Statistik</h2>

<div class="stat">
Jetzt mit ihr schreiben
<div class="barContainer">
<div class="bar" id="writeBar"></div>
</div>
<span id="writeText"></span>
</div>

<div class="stat">
Nein danke
<div class="barContainer">
<div class="bar" id="noBar"></div>
</div>
<span id="noText"></span>
</div>

<div class="stat">
Gesamt Entscheidungen: <span id="total"></span>
</div>

<button onclick="resetStats()">Statistik zurücksetzen</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("choices")) || {write:0,no:0};

let total = data.write + data.no;

document.getElementById("total").innerText = total;

if(total > 0){

let writePercent = (data.write / total) * 100;
let noPercent = (data.no / total) * 100;

document.getElementById("writeBar").style.width = writePercent + "%";
document.getElementById("noBar").style.width = noPercent + "%";

document.getElementById("writeText").innerText =
data.write + " (" + Math.round(writePercent) + "%)";

document.getElementById("noText").innerText =
data.no + " (" + Math.round(noPercent) + "%)";

}

function resetStats(){

localStorage.removeItem("choices");

location.reload();

}

</script>

</body>
</html>
