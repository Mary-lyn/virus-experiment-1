<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neue Nachricht</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.card{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:18px;
text-align:center;
max-width:420px;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:linear-gradient(45deg,#00e5ff,#00ffa6);
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
margin:auto;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.yes{background:#00e5ff;}
.no{background:#555;color:white;}

</style>
</head>

<body>

<div class="card">

<div class="avatar">💬</div>

<h2>Neue Kontaktanfrage</h2>

<p>Jemand möchte dir eine Nachricht schicken.</p>

<button class="yes" onclick="next()">Jetzt antworten</button>
<button class="no" onclick="next()">Nein danke</button>

</div>

<script>

function next(){
window.location.href="scan45.html";
}

let clicks=0;

document.querySelector(".avatar").addEventListener("click",()=>{

clicks++;

if(clicks===5){
alert("🥚 Easter Egg gefunden!");
}

});

</script>

</body>
</html>
