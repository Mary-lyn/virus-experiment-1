<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  overflow:hidden;
}

body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05) 2px, transparent 2px),
    radial-gradient(circle at 80% 60%, rgba(255,255,255,0.05) 2px, transparent 2px);
  background-size:120px 120px;
  animation:bgmove 40s linear infinite;
}

@keyframes bgmove{
  from{transform:translate(0,0);}
  to{transform:translate(-200px,-200px);}
}

.container{
  text-align:center;
  z-index:2;
}

.pointer{
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:25px solid white;
  margin:auto;
  margin-bottom:10px;
}

#wheel{
  width:260px;
  height:260px;
  border-radius:50%;
  border:10px solid white;
  margin:auto;
  background: conic-gradient(
    #ff4d4d 0deg 72deg,
    #ffd24d 72deg 144deg,
    #4dff88 144deg 216deg,
    #4da6ff 216deg 288deg,
    #c24dff 288deg 360deg
  );
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:28px;
  transition: transform 5s cubic-bezier(.17,.67,.21,1);
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.card{
  margin-top:30px;
  background:rgba(255,255,255,0.08);
  padding:35px;
  border-radius:18px;
  max-width:420px;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

button{
  margin-top:15px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  font-weight:bold;
  transition: 0.25s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 12px rgba(255,255,255,0.4);
}

.spinbtn{
  background:gold;
}

.mainbtn{
  background: linear-gradient(45deg,#00e5ff,#00bcd4);
  color:#003;
}

.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall linear forwards;
  border-radius:50%;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg);}
}
</style>
</head>

<body>

<div class="container">

<div class="pointer"></div>

<div id="wheel">BINGO</div>

<button class="spinbtn" onclick="spinWheel()">🎡 Rad drehen</button>

<div class="card">
  <h2>🎉 Sicherheitsproblem behoben</h2>
  <p>Ihr Gerät wurde erfolgreich überprüft.</p>
  <button class="mainbtn" onclick="window.location.href='kontakt.html'">
    Jetzt hier drücken um Ihre Belohnung zu erhalten
  </button>
</div>

</div>

<script>
function spinWheel(){
  let wheel = document.getElementById("wheel");
  let rotation = 3600 + Math.random()*360;
  wheel.style.transform = "rotate("+rotation+"deg)";
  setTimeout(confettiBurst,5000);
}

function confettiBurst(){
  for(let i=0;i<80;i++){
    let conf = document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.background = ["#ff4d4d","#ffd24d","#4dff88","#4da6ff","#c24dff"][Math.floor(Math.random()*5)];
    conf.style.animationDuration = (2 + Math.random()*3)+"s";
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),5000);
  }
}
</script>

</body>
</html>
