<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Glücksrad</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#ffd700,#b48b00,#5c4200);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
color:white;
text-align:center;
}

.logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:150px;
opacity:0.05;
pointer-events:none;
}

.wheel-container{
position:relative;
width:320px;
height:320px;
}

.wheel{
width:100%;
height:100%;
border-radius:50%;
border:10px solid gold;

background:conic-gradient(
#ffffff 0deg 45deg,
#111111 45deg 90deg,
#ffffff 90deg 135deg,
#111111 135deg 180deg,
#ffffff 180deg 225deg,
#111111 225deg 270deg,
#ffffff 270deg 315deg,
gold 315deg 360deg
);

transition:transform 4s cubic-bezier(.17,.67,.32,1.34);
cursor:pointer;
}

.pointer{
position:absolute;
top:-25px;
left:50%;
transform:translateX(-50%);
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:30px solid white;
}

.win{
margin-top:25px;
font-size:22px;
display:none;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ffcc00,#ff8800);
cursor:pointer;
display:none;
}

</style>
</head>

<body>

<div class="logo">CASINO</div>

<h1>🎰 Casino Glücksrad</h1>

<div class="wheel-container">

<div class="wheel" id="wheel"></div>
<div class="pointer"></div>

</div>

<div class="win" id="winText">
🏆 Sie haben einen Lamborghini gewonnen!<br>
Erhalten Sie Ihre Belohnung hier
</div>

<button id="nextBtn" onclick="nextPage()">
Belohnung erhalten
</button>

<script>

let spun=false;
const wheel=document.getElementById("wheel");

/* Mittelpunkt des goldenen Segments */
const bingoCenter = 337.5;

wheel.onclick=function(){

if(spun) return;
spun=true;

/* Exakte Ausrichtung auf goldenes Segment */
let rotation = 3600 - bingoCenter;

wheel.style.transform="rotate("+rotation+"deg)";

setTimeout(()=>{

document.getElementById("winText").style.display="block";
document.getElementById("nextBtn").style.display="inline-block";

},4000);

}

function nextPage(){
window.location.href="kontakt.html";
}

</script>

</body>
</html>
